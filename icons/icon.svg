<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="spike" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00c853"/>
      <stop offset="100%" stop-color="#69ff47"/>
    </linearGradient>
    <linearGradient id="peak" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ffcc02"/>
    </linearGradient>
    <clipPath id="bubble-clip">
      <path d="M12,10 Q12,6 16,6 L112,6 Q116,6 116,10 L116,80 Q116,84 112,84 L72,84 L60,100 L48,84 L16,84 Q12,84 12,80 Z"/>
    </clipPath>
  </defs>

  <!-- Background rounded rect -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Chat bubble shape -->
  <path d="M12,10 Q12,6 16,6 L112,6 Q116,6 116,10 L116,80 Q116,84 112,84 L72,84 L60,100 L48,84 L16,84 Q12,84 12,80 Z"
        fill="#0f3460" opacity="0.7"/>

  <!-- Chat lines (simulated text) -->
  <rect x="22" y="20" width="55" height="5" rx="2.5" fill="#4a90d9" opacity="0.5"/>
  <rect x="22" y="31" width="40" height="5" rx="2.5" fill="#4a90d9" opacity="0.4"/>

  <!-- Waveform / bar chart inside bubble -->
  <!-- baseline bars (normal chat) -->
  <rect x="22" y="58" width="7" height="14" rx="2" fill="url(#spike)" opacity="0.7"/>
  <rect x="32" y="54" width="7" height="18" rx="2" fill="url(#spike)" opacity="0.7"/>
  <rect x="42" y="56" width="7" height="16" rx="2" fill="url(#spike)" opacity="0.7"/>

  <!-- spike bar (peak moment) -->
  <rect x="54" y="36" width="10" height="36" rx="3" fill="url(#peak)"/>
  <!-- glow effect on spike -->
  <rect x="55" y="37" width="8" height="34" rx="2" fill="white" opacity="0.15"/>

  <!-- normal bars after spike -->
  <rect x="68" y="57" width="7" height="15" rx="2" fill="url(#spike)" opacity="0.7"/>
  <rect x="78" y="53" width="7" height="19" rx="2" fill="url(#spike)" opacity="0.7"/>
  <rect x="88" y="58" width="7" height="14" rx="2" fill="url(#spike)" opacity="0.7"/>

  <!-- small dot indicator on peak -->
  <circle cx="59" cy="32" r="4" fill="#ffcc02"/>
  <circle cx="59" cy="32" r="2" fill="white"/>
</svg>
