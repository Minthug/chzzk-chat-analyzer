<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>치지직 채팅 분석기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      min-height: 200px;
      background: #0f0f1a;
      color: #ddd;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
    }

    header {
      background: #1a1a2e;
      padding: 12px 16px;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    header h1 { font-size: 14px; font-weight: 600; color: #fff; }
    header .badge {
      margin-left: auto;
      background: #e74c3c;
      color: #fff;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      display: none;
    }
    header .badge.visible { display: inline; }

    .section {
      padding: 10px 14px;
      border-bottom: 1px solid #1e1e2e;
    }
    .section-title {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .stat-box {
      background: #1a1a2e;
      border-radius: 6px;
      padding: 8px;
      text-align: center;
    }
    .stat-value { font-size: 20px; font-weight: 700; color: #fff; }
    .stat-label { font-size: 10px; color: #888; margin-top: 2px; }

    .spike-list {
      max-height: 280px;
      overflow-y: auto;
    }
    .spike-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 4px;
      border-bottom: 1px solid #1a1a2e;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.1s;
    }
    .spike-item:hover { background: #1e2a3a; }
    .spike-item:active { background: #243040; }
    .spike-thumb {
      width: 80px;
      height: 45px;
      object-fit: cover;
      border-radius: 3px;
      flex-shrink: 0;
      background: #111;
    }
    .spike-thumb-empty {
      width: 80px;
      height: 45px;
      border-radius: 3px;
      flex-shrink: 0;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #444;
    }
    .spike-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }
    .spike-time { color: #e74c3c; font-weight: 600; font-size: 12px; }
    .spike-star { color: #f1c40f; font-size: 11px; margin-left: 3px; }
    .spike-count { color: #aaa; font-size: 11px; }
    .spike-ratio { color: #e67e22; font-size: 11px; }

    .section-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 8px;
    }
    .section-header .section-title { margin-bottom: 0; }
    .spike-tabs { display: flex; gap: 4px; }
    .spike-tab {
      padding: 2px 10px; border: 1px solid #333;
      border-radius: 10px; background: transparent;
      color: #666; font-size: 10px; cursor: pointer; transition: all 0.15s;
    }
    .spike-tab.active { background: #2980b9; border-color: #2980b9; color: #fff; }

    .keyword-badge {
      flex-shrink: 0; width: 80px; height: 45px;
      background: #0d1f2d; border: 1px solid #2980b9; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; color: #5dade2;
      word-break: break-all; text-align: center; padding: 4px;
    }
    .keyword-input-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .keyword-input-row input {
      flex: 1; background: #1a1a2e; border: 1px solid #333;
      color: #ddd; border-radius: 4px; padding: 4px 8px; font-size: 12px;
    }
    .btn-keyword-add {
      padding: 4px 10px; background: #2980b9; color: #fff;
      border: none; border-radius: 4px; font-size: 11px;
      cursor: pointer; white-space: nowrap;
    }
    .btn-keyword-add:hover { opacity: 0.85; }
    .keyword-tag-list { display: flex; flex-wrap: wrap; gap: 5px; min-height: 20px; }
    .keyword-tag {
      display: flex; align-items: center; gap: 4px;
      background: #1a1a2e; border: 1px solid #2980b9; border-radius: 12px;
      padding: 2px 8px 2px 10px; font-size: 11px; color: #5dade2;
    }
    .keyword-tag-del { cursor: pointer; color: #555; font-size: 13px; line-height: 1; }
    .keyword-tag-del:hover { color: #e74c3c; }

    .spike-memo-wrap {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 6px;
      padding: 4px 7px;
      background: #0a0a16;
      border: 1px solid #1e1e34;
      border-left: 2px solid #2a2a4a;
      border-radius: 3px;
      transition: border-color 0.15s, border-left-color 0.15s;
    }
    .spike-memo-wrap:focus-within {
      border-color: #3a3a5a;
      border-left-color: #5a5a9a;
    }
    .spike-memo-icon {
      font-size: 10px;
      color: #444;
      flex-shrink: 0;
      user-select: none;
      transition: color 0.15s;
    }
    .spike-memo-wrap:focus-within .spike-memo-icon { color: #7a7ab0; }
    .spike-memo {
      flex: 1;
      background: transparent;
      border: none;
      color: #777;
      font-size: 11px;
      outline: none;
      font-family: inherit;
      min-width: 0;
      transition: color 0.15s;
    }
    .spike-memo::placeholder { color: #383850; }
    .spike-memo:focus { color: #ccc; }
    .spike-memo-wrap.has-memo {
      border-left-color: #4a6fa5;
      background: #0c0c1e;
    }
    .spike-memo-wrap.has-memo .spike-memo { color: #99aac8; }
    .spike-memo-wrap.has-memo .spike-memo-icon { color: #4a6fa5; }

    .manager-chat-item {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 5px 4px;
      border-bottom: 1px solid #1a1a2e;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.1s;
    }
    .manager-chat-item:hover { background: #1e2a3a; }
    .manager-chat-time {
      font-size: 11px;
      color: #e67e22;
      font-weight: 600;
      flex-shrink: 0;
    }
    .manager-chat-nick {
      font-size: 11px;
      color: #5dade2;
      font-weight: 600;
      flex-shrink: 0;
    }
    .manager-chat-text {
      font-size: 12px;
      color: #ccc;
      word-break: break-all;
    }

    .empty-msg {
      color: #555;
      text-align: center;
      padding: 16px 0;
      font-size: 12px;
    }

    .export-row {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
    }
    .btn {
      flex: 1;
      padding: 7px;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-txt { background: #27ae60; color: #fff; }
    .btn-csv { background: #2980b9; color: #fff; }
    .btn-clear { background: #555; color: #fff; }
    .btn:not(:disabled):hover { opacity: 0.85; }

    .settings-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 0 14px 10px;
    }
    .setting-group label {
      display: block;
      font-size: 10px;
      color: #888;
      margin-bottom: 3px;
    }
    .setting-group input {
      width: 100%;
      background: #1a1a2e;
      border: 1px solid #333;
      color: #ddd;
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 12px;
    }
    .btn-save {
      display: block;
      width: calc(100% - 28px);
      margin: 0 14px 10px;
      padding: 6px;
      background: #555;
      color: #ddd;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-save:hover { background: #666; }

    .storage-bar-wrap { margin-bottom: 6px; }
    .storage-bar-bg {
      width: 100%; height: 5px;
      background: #1a1a2e;
      border-radius: 3px; overflow: hidden;
      margin-bottom: 4px;
    }
    .storage-bar-fill {
      height: 100%; width: 0%;
      border-radius: 3px;
      transition: width 0.4s, background-color 0.4s;
      background: #27ae60;
    }
    .storage-text { font-size: 10px; color: #888; }
    .btn-thumb-clear {
      display: block; width: 100%; margin-top: 8px; padding: 5px;
      background: #2a2a3e; color: #888;
      border: 1px solid #333; border-radius: 4px;
      font-size: 11px; cursor: pointer; text-align: center;
    }
    .btn-thumb-clear:hover { background: #333; color: #bbb; }
    .setting-toggle {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 14px 8px; cursor: pointer;
      font-size: 11px; color: #aaa;
    }
    .setting-toggle input[type='checkbox'] {
      cursor: pointer; accent-color: #3498db;
    }

    .status-bar {
      padding: 4px 14px 8px;
      font-size: 10px;
      color: #555;
    }

    .donate-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px 10px;
      border-top: 1px solid #1a1a2e;
      gap: 8px;
    }
    .donate-label {
      font-size: 10px;
      color: #555;
      white-space: nowrap;
    }
    .donate-account {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      flex: 1;
      justify-content: center;
    }
    .donate-account:hover { background: #1f2a3e; border-color: #3a4a6a; }
    .donate-account-bank { font-size: 10px; color: #5090d0; font-weight: 600; }
    .donate-account-num { font-size: 11px; color: #aaa; letter-spacing: 0.3px; }
    .donate-copy-msg {
      font-size: 10px;
      color: #27ae60;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .donate-copy-msg.visible { opacity: 1; }
  </style>
</head>
<body>
  <header>
    <span>📊</span>
    <h1>치지직 채팅 분석기</h1>
    <span class="badge" id="spike-badge">스파이크!</span>
  </header>

  <!-- Stats -->
  <div class="section">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
      <div class="section-title" style="margin-bottom:0;">현재 세션</div>
      <span style="font-size:10px; color:#444;">작동 안 할 시 새로고침 해보세요</span>
    </div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">총 채팅</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="stat-windows">0</div>
        <div class="stat-label">분석 구간</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="stat-spikes" style="color:#e74c3c">0</div>
        <div class="stat-label">급증 감지</div>
      </div>
    </div>
  </div>

  <!-- Spike list -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">채팅 급증 구간</span>
      <div class="spike-tabs">
        <button class="spike-tab active" id="tab-volume">볼륨</button>
        <button class="spike-tab" id="tab-keyword">키워드</button>
        <button class="spike-tab" id="tab-manager">매니저</button>
      </div>
    </div>
    <div class="spike-list" id="spike-list">
      <div class="empty-msg">채팅 데이터 수집 중...<br>치지직 라이브 또는 VOD를 시청하세요.</div>
    </div>
  </div>

  <!-- Storage -->
  <div class="section">
    <div class="section-title">스토리지</div>
    <div class="storage-bar-wrap">
      <div class="storage-bar-bg">
        <div class="storage-bar-fill" id="storage-bar-fill"></div>
      </div>
      <span class="storage-text" id="storage-text">계산 중...</span>
    </div>
    <button class="btn-thumb-clear" id="btn-clear-thumbnails">📷 썸네일만 삭제</button>
  </div>

  <!-- Keyword detection -->
  <div class="section">
    <div class="section-title">키워드 감지</div>
    <div class="keyword-input-row">
      <input type="text" id="setting-keyword-input" placeholder="키워드 입력 후 Enter 또는 추가" />
      <button class="btn-keyword-add" id="btn-add-keyword">추가</button>
    </div>
    <div class="keyword-tag-list" id="keyword-tag-list"></div>
    <div style="font-size:10px; color:#444; margin-top:6px;">ㅋ, ㅎ 등 단독 자음/모음은 등록할 수 없습니다.</div>
  </div>

  <!-- Settings -->
  <div class="section">
    <div class="section-title">설정</div>
    <div class="settings-row">
      <div class="setting-group">
        <label>Z-Score 임계값 (기본 3.0)</label>
        <input type="number" id="setting-z" min="1" max="10" step="0.1" value="3.0" />
      </div>
      <div class="setting-group">
        <label>윈도우 크기 (초, 기본 30)</label>
        <input type="number" id="setting-window" min="10" max="300" step="10" value="30" />
      </div>
    </div>
    <label class="setting-toggle">
      <input type="checkbox" id="setting-thumbnail" checked />
      썸네일 자동 캡처
    </label>
    <label class="setting-toggle">
      <input type="checkbox" id="setting-auto-export" checked />
      방송 이동/종료 시 TXT 자동 저장
    </label>
    <button class="btn-save" id="btn-save-settings">설정 저장</button>
    <div class="export-row" style="padding: 8px 0 0;">
      <button class="btn btn-txt" id="btn-export-txt" disabled>TXT 내보내기</button>
      <button class="btn btn-csv" id="btn-export-csv" disabled>CSV 내보내기</button>
      <button class="btn btn-clear" id="btn-clear">초기화</button>
    </div>
  </div>

  <div class="status-bar" id="status-bar">대기 중</div>

  <div class="donate-bar">
    <span class="donate-label">☕ 후원</span>
    <div class="donate-account" id="donate-account">
      <span class="donate-account-bank">토스뱅크</span>
      <span class="donate-account-num">1002-4571-5093</span>
    </div>
    <span class="donate-copy-msg" id="donate-copy-msg">복사됨!</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
